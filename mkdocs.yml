site_name: Code & Core Learning System
site_url: https://mohangc07.github.io/code-core-learning-system/
site_description: Learn Coding, Robotics, AI and Technology step by step
site_author: Mohan G.C

docs_dir: docs

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - scheme: default
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - announce.dismiss
    - header.autohide
    - toc.follow
    - toc.integrate
  logo: assets/images/logo.svg
  favicon: assets/images/favicon.png
  icon:
    repo: fontawesome/brands/github

repo_name: MohanGC07/code-core-learning-system
repo_url: https://github.com/MohanGC07/code-core-learning-system
edit_uri: edit/main/docs/

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.tabbed
  - pymdownx.superfences
  - pymdownx.emoji
  - pymdownx.tasklist
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - def_list
  - toc:
      permalink: true
      title: On this page

plugins:
  - search:
      lang: en
  - awesome-pages
  - minify:
      minify_html: true

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - assets/js/mermaid-init.js

extra_css:
  - assets/css/extra.css

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/MohanGC07/code-core-learning-system
  copyright: Copyright &copy; 2026 Mohan G.C