# ============================================================
# mkdocs.yml — Code & Core Learning System
# ============================================================

site_name: Code & Core Learning System
site_url: https://mohangc07.github.io/code-core-learning-system/
site_description: Learn Coding, Robotics, AI and Technology step by step
site_author: Mohan G.C

docs_dir: docs

repo_name: MohanGC07/code-core-learning-system
repo_url: https://github.com/MohanGC07/code-core-learning-system
edit_uri: edit/main/docs/

# ============================================================
# THEME
# ============================================================
theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Dark mode
    - scheme: slate
      primary: blue
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  logo: https://cdn.jsdelivr.net/gh/devicons/devicon/icons/github/github-original.svg
  favicon: https://cdn.jsdelivr.net/gh/devicons/devicon/icons/github/github-original.svg
  icon:
    repo: fontawesome/brands/github

# ============================================================
# MARKDOWN EXTENSIONS
# ============================================================
markdown_extensions:

  - admonition

  - pymdownx.details

  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true

  - pymdownx.inlinehilite

  - pymdownx.tabbed:
      alternate_style: true

  # THE KEY FIX — Mermaid wired in here
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

  - pymdownx.tasklist:
      custom_checkbox: true

  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - def_list

  - toc:
      permalink: true
      title: On this page

# ============================================================
# PLUGINS
# ============================================================
plugins:
  - search:
      lang: en
  - awesome-pages

# ============================================================
# MERMAID JS — must be loaded externally
# ============================================================
extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/MohanGC07/code-core-learning-system

# ============================================================
# NAVIGATION — matched to YOUR exact folder structure
# ============================================================
nav:
  - Home: index.md
  - Coding:
    - Python:
      - Overview: coding/python/module-01-basics/README.md
      - Module 01 — Basics:
        - Lesson 01 — Welcome to Python: coding/python/module-01-basics/lesson-01.md
        - Lesson 02 — Variables & Data: coding/python/module-01-basics/lesson-02.md
        - Lesson 03 — Control Flow: coding/python/module-01-basics/lesson-03.md
    - PictoBlox:
      - Coming Soon: coding/pictoblox/index.md
  - Robotics:
    - Module 01 — Foundations:
      - Lesson 01: robotics/module-01-foundations/lesson-01.md
  - Resources: resources/index.md