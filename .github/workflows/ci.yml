name: Deploy MkDocs

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Clean workspace
        run: |
          rm -rf *
          rm -rf .*

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify overrides folder
        run: |
          echo "=== Contents of docs/overrides ==="
          ls -la docs/overrides/
          echo "=== Any README files? ==="
          find . -name "README.md" -path "*/overrides/*" || echo "No overrides README found"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Install dependencies
        run: |
          pip install --upgrade mkdocs-material[imaging]
          pip install --upgrade mkdocs-awesome-pages-plugin
          pip install --upgrade mkdocs-minify-plugin

      - name: Verify mkdocs.yml
        run: |
          echo "=== Line 70-76 ==="
          sed -n '70,76p' mkdocs.yml
          echo "=== Any python/name tags? ==="
          grep -n "python/name" mkdocs.yml || echo "None found"

      - name: Configure Git
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

      - name: Deploy
        run: mkdocs gh-deploy --force