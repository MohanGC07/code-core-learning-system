name: Deploy MkDocs

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Install dependencies
        run: |
          pip install mkdocs-material
          pip install mkdocs-awesome-pages-plugin
          pip install mkdocs-minify-plugin

      - name: Ensure required folders and fallback assets exist
        run: |
          # ✅ Overrides at ROOT level (not inside docs/)
          mkdir -p overrides

          # ✅ Ensure asset folders exist
          mkdir -p docs/assets/css
          mkdir -p docs/assets/js
          mkdir -p docs/assets/images

          # ✅ Create fallback extra.css if missing
          if [ ! -f docs/assets/css/extra.css ]; then
            echo "/* Custom styles placeholder */" > docs/assets/css/extra.css
          fi

          # ✅ Create fallback mermaid-init.js if missing
          if [ ! -f docs/assets/js/mermaid-init.js ]; then
            cat > docs/assets/js/mermaid-init.js << 'JSEOF'
          document$.subscribe(() => {
            mermaid.initialize({
              startOnLoad: false,
              theme: document.documentElement.getAttribute('data-md-color-scheme') === 'slate' ? 'dark' : 'default'
            });
            mermaid.run({ querySelector: '.mermaid' });
          });
          JSEOF
          fi

          # ✅ Create placeholder logo/favicon if missing (prevents 404 errors)
          if [ ! -f docs/assets/images/logo.svg ]; then
            echo '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="#7c3aed"/></svg>' > docs/assets/images/logo.svg
          fi

      - name: Configure Git
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

      - name: Deploy
        run: mkdocs gh-deploy --force --clean